name: Build Fedora LiveCD ISO (GNOME)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build ISO with Docker
        run: |
          docker run --privileged --rm -v ${{ github.workspace }}:/build fedora:44 bash -c "
            mount --make-rprivate /
            sed -i '/exclude/d' /etc/dnf/dnf.conf
            sed -i '/exclude/d' /etc/yum.repos.d/*.repo
            dnf install -y livecd-tools util-linux
            echo 'install_weak_deps=False' >> /etc/dnf/dnf.conf
            echo '%_install_langs C' > /etc/rpm/macros.langs
            # Ignorar MountError no loop device do docker
            sed -i 's/raise MountError(umount_fail_fmt.*/pass/g' /usr/lib/python3.*/site-packages/imgcreate/fs.py
            cd /build
            sed -i 's/\r$//' fedora-live-tecnico.ks
            sed -i 's/\r$//' scripts/*.sh
            livecd-creator --verbose --config=fedora-live-tecnico.ks --fslabel=ISO_LOUCA_BOOT
          "

      - name: Verificar e renomear ISO
        run: |
          ls -lh ISO_LOUCA_BOOT.iso || (echo "ERRO: ISO não gerada!" && exit 1)
          cp ISO_LOUCA_BOOT.iso ISO-LOUCA-GNOME.iso

      - name: Upload da ISO como Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ISO-LOUCA-GNOME
          path: ISO-LOUCA-GNOME.iso
          retention-days: 7
