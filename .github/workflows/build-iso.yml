name: Build ISO Louca (Debian Live / LXQt Dark)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar live-build
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y live-build debootstrap

      - name: Inicializar configuração do live-build
        run: |
          mkdir -p build
          cd build
          lb config \
            --distribution bookworm \
            --architecture amd64 \
            --binary-images iso-hybrid \
            --debian-installer none \
            --chroot-filesystem squashfs \
            --compression xz \
            --apt-recommends false \
            --iso-volume "ISO-LOUCA"

      - name: Copiar configurações do live-build
        run: |
          # Copiar listas de pacotes
          cp -r config/package-lists build/config/

          # Copiar hooks
          cp -r config/hooks build/config/

          # Copiar arquivos includes (lightdm.conf, skel, etc.)
          cp -r config/includes.chroot build/config/

          # Copiar wallpaper para dentro do chroot
          mkdir -p build/config/includes.chroot/usr/share/backgrounds
          cp "Wallpapers/wallpaper4_1440x900.png" \
             build/config/includes.chroot/usr/share/backgrounds/tecnico-wallpaper.png

          # Copiar scripts técnicos para dentro do chroot
          mkdir -p build/config/includes.chroot/scripts
          cp scripts/*.sh build/config/includes.chroot/scripts/

          # Garantir permissões de execução nos hooks
          chmod +x build/config/hooks/live/*.hook.chroot

      - name: Build da ISO
        run: |
          cd build
          sudo lb build 2>&1 | tee build.log

      - name: Verificar ISO gerada
        run: |
          ls -lh build/*.iso 2>/dev/null || (echo "ERRO: ISO não foi gerada!" && tail -50 build/build.log && exit 1)
          # Renomear para nome amigável
          find build/ -name "*.iso" -exec cp {} build/ISO-LOUCA-LXQt.iso \; || true

      - name: Upload da ISO como artefato
        uses: actions/upload-artifact@v4
        with:
          name: ISO-LOUCA-LXQt-Dark
          path: build/ISO-LOUCA-LXQt.iso
          retention-days: 7

      - name: Upload do log de build (se falhar)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build/build.log
          retention-days: 3
